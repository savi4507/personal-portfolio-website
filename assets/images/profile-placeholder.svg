<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#090d16" stop-opacity="0.9"/>
    </radialGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="250" cy="250" r="230" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Outer Rotating-like Tech Rings -->
  <circle cx="250" cy="250" r="210" fill="none" stroke="url(#neonCyan)" stroke-width="2" stroke-dasharray="10 30 150 20 40 40" opacity="0.6"/>
  <circle cx="250" cy="250" r="195" fill="none" stroke="url(#neonPurple)" stroke-width="1.5" stroke-dasharray="80 40 10 30 50 10" opacity="0.5"/>
  <circle cx="250" cy="250" r="180" fill="none" stroke="#06b6d4" stroke-width="1" stroke-dasharray="5 5" opacity="0.4"/>
  
  <!-- Tech Binary/Hex Grid in background -->
  <g opacity="0.15" fill="#06b6d4" font-family="Courier, monospace" font-size="10">
    <text x="120" y="150">&lt;AI_CORE&gt;</text>
    <text x="310" y="160">0x7F 0x8A</text>
    <text x="100" y="280">SYS_INIT</text>
    <text x="320" y="320">1011001</text>
    <text x="210" y="410">WEB_DEV</text>
  </g>

  <!-- Hexagonal frame representing Robotics and Structure -->
  <polygon points="250,90 380,165 380,315 250,390 120,315 120,165" 
           fill="none" stroke="url(#neonCyan)" stroke-width="3" filter="url(#glowCyan)" opacity="0.8"/>
  
  <polygon points="250,110 360,175 360,305 250,370 140,305 140,175" 
           fill="none" stroke="url(#neonPurple)" stroke-width="1" opacity="0.4"/>

  <!-- Futuristic Robot/Human Silhouette -->
  <!-- Shoulders -->
  <path d="M 160 380 C 160 330, 200 310, 250 310 C 300 310, 340 330, 340 380" 
        fill="url(#neonCyan)" opacity="0.45" />
  
  <!-- Outer glowing shoulders -->
  <path d="M 160 380 C 160 330, 200 310, 250 310 C 300 310, 340 330, 340 380" 
        fill="none" stroke="url(#neonCyan)" stroke-width="2" filter="url(#glowCyan)"/>

  <!-- Cyber Neck -->
  <rect x="238" y="270" width="24" height="45" rx="5" fill="url(#neonPurple)" opacity="0.8"/>
  <line x1="250" y1="270" x2="250" y2="310" stroke="#06b6d4" stroke-width="2"/>

  <!-- Glowing Cyber Head (Visor Style) -->
  <rect x="200" y="170" width="100" height="100" rx="50" fill="#090d16" stroke="url(#neonPurple)" stroke-width="3" filter="url(#glowPurple)"/>
  
  <!-- Cyber Visor / Eyes -->
  <path d="M 210 215 L 290 215 C 295 215, 295 228, 290 228 L 210 228 C 205 228, 205 215, 210 215 Z" 
        fill="url(#neonCyan)" filter="url(#glowCyan)"/>
  <rect x="245" y="218" width="10" height="7" rx="1" fill="#fff" filter="url(#glowCyan)"/>

  <!-- Cybernetic Floating Data Nodes -->
  <circle cx="160" cy="200" r="5" fill="#d946ef" filter="url(#glowPurple)"/>
  <line x1="160" y1="200" x2="200" y2="210" stroke="#d946ef" stroke-width="1" stroke-dasharray="2 2"/>
  
  <circle cx="340" cy="240" r="4" fill="#06b6d4" filter="url(#glowCyan)"/>
  <line x1="340" y1="240" x2="295" y2="230" stroke="#06b6d4" stroke-width="1" stroke-dasharray="2 2"/>
  
  <circle cx="250" cy="70" r="6" fill="#06b6d4" filter="url(#glowCyan)"/>
  <line x1="250" y1="70" x2="250" y2="90" stroke="#06b6d4" stroke-width="2"/>
</svg>
