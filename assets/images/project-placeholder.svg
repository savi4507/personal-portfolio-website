<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1329"/>
      <stop offset="100%" stop-color="#060913"/>
    </linearGradient>

    <!-- Neon Gradients -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0844"/>
      <stop offset="100%" stop-color="#ffb199"/>
    </linearGradient>

    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f857a6"/>
      <stop offset="100%" stop-color="#ff5858"/>
    </linearGradient>
    
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Container Base -->
  <rect width="600" height="400" rx="12" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Sleek Tech Grid Overlay -->
  <g opacity="0.08" stroke="#38bdf8" stroke-width="1">
    <path d="M 0,50 L 600,50 M 0,100 L 600,100 M 0,150 L 600,150 M 0,200 L 600,200 M 0,250 L 600,250 M 0,300 L 600,300 M 0,350 L 600,350" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400" />
  </g>

  <!-- IDE Window Frame -->
  <rect x="25" y="30" width="550" height="340" rx="8" fill="#0c1020" fill-opacity="0.85" stroke="#1e293b" stroke-width="1.5" />
  
  <!-- Window Control Buttons (Red, Yellow, Green) -->
  <circle cx="50" cy="52" r="6" fill="#ef4444"/>
  <circle cx="70" cy="52" r="6" fill="#f59e0b"/>
  <circle cx="90" cy="52" r="6" fill="#10b981"/>
  
  <!-- Tab Element -->
  <path d="M 120,62 L 135,42 L 245,42 L 260,62 Z" fill="#18223f" stroke="#1e293b" stroke-width="1" />
  <text x="145" y="55" fill="#38bdf8" font-family="Courier, monospace" font-size="11" font-weight="bold">index.js</text>
  <path d="M 230,50 L 236,56 M 236,50 L 230,56" stroke="#94a3b8" stroke-width="1.5" />

  <!-- Code Area - Left Side -->
  <!-- Line Numbers -->
  <g fill="#475569" font-family="Courier, monospace" font-size="12" text-anchor="end">
    <text x="55" y="100">1</text>
    <text x="55" y="125">2</text>
    <text x="55" y="150">3</text>
    <text x="55" y="175">4</text>
    <text x="55" y="200">5</text>
    <text x="55" y="225">6</text>
    <text x="55" y="250">7</text>
    <text x="55" y="275">8</text>
    <text x="55" y="300">9</text>
    <text x="55" y="325">10</text>
  </g>

  <!-- Code Snippet Mockup (Colored Horizontal Rectangles representing lines) -->
  <g opacity="0.95">
    <!-- const project = { -->
    <rect x="75" y="90" width="40" height="10" rx="3" fill="#f43f5e" />
    <rect x="120" y="90" width="60" height="10" rx="3" fill="#60a5fa" />
    <rect x="185" y="90" width="15" height="10" rx="3" fill="#fff" />
    <rect x="205" y="90" width="10" height="10" rx="3" fill="#38bdf8" />
    
    <!-- name: "Vivek Portfolio", -->
    <rect x="95" y="115" width="35" height="10" rx="3" fill="#fbbf24" />
    <rect x="135" y="115" width="100" height="10" rx="3" fill="#34d399" />
    
    <!-- tech: ["AI", "Web", "Robotics"], -->
    <rect x="95" y="140" width="35" height="10" rx="3" fill="#fbbf24" />
    <rect x="135" y="140" width="140" height="10" rx="3" fill="#34d399" />

    <!-- status: "Active", -->
    <rect x="95" y="165" width="50" height="10" rx="3" fill="#fbbf24" />
    <rect x="150" y="165" width="60" height="10" rx="3" fill="#34d399" />

    <!-- performance: "Optimum" -->
    <rect x="95" y="190" width="85" height="10" rx="3" fill="#fbbf24" />
    <rect x="185" y="190" width="60" height="10" rx="3" fill="#34d399" />
    
    <!-- }; -->
    <rect x="75" y="215" width="15" height="10" rx="3" fill="#38bdf8" />

    <!-- function initSystem() { -->
    <rect x="75" y="240" width="60" height="10" rx="3" fill="#f43f5e" />
    <rect x="140" y="240" width="80" height="10" rx="3" fill="#818cf8" />
    <rect x="225" y="240" width="20" height="10" rx="3" fill="#fff" />

    <!--   console.log("System Online"); -->
    <rect x="95" y="265" width="55" height="10" rx="3" fill="#60a5fa" />
    <rect x="155" y="265" width="105" height="10" rx="3" fill="#34d399" />
    
    <!-- } -->
    <rect x="75" y="290" width="10" height="10" rx="3" fill="#fff" />
  </g>

  <!-- Visual Graphics Overlay - Right Side -->
  <g transform="translate(340, 85)">
    <!-- Glassmorphic Inner Graphic -->
    <rect width="210" height="255" rx="8" fill="#141b2d" fill-opacity="0.7" stroke="#1e293b" stroke-width="1.5" />
    
    <!-- Radar Circle / Robotic Node Visual -->
    <circle cx="105" cy="110" r="65" fill="none" stroke="url(#neonCyan)" stroke-width="2" stroke-dasharray="10 20" opacity="0.6"/>
    <circle cx="105" cy="110" r="45" fill="none" stroke="url(#neonPink)" stroke-width="1.5"/>
    <circle cx="105" cy="110" r="25" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="2 2"/>
    <circle cx="105" cy="110" r="8" fill="url(#neonCyan)" filter="url(#glow)"/>
    
    <!-- Tech Lines and Data Dots -->
    <line x1="105" y1="45" x2="105" y2="25" stroke="#00f2fe" stroke-width="1.5"/>
    <circle cx="105" cy="22" r="3" fill="#00f2fe" filter="url(#glow)"/>
    
    <line x1="40" y1="110" x2="20" y2="110" stroke="#ff0844" stroke-width="1.5"/>
    <circle cx="17" cy="110" r="3" fill="#ff0844" filter="url(#glow)"/>
    
    <line x1="170" y1="110" x2="190" y2="110" stroke="#00f2fe" stroke-width="1.5"/>
    <circle cx="193" cy="110" r="3" fill="#00f2fe" filter="url(#glow)"/>

    <text x="105" y="210" fill="#fff" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="1">PROJECT DATA</text>
    <text x="105" y="230" fill="#64748b" font-family="Courier, monospace" font-size="10" text-anchor="middle">STATUS: DEPLOYED</text>
  </g>
</svg>
